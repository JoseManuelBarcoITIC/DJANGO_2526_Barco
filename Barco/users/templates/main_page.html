{% extends 'main.html' %}

{% block content %}
    <h1>Llista d'usuaris</h1>
        <ul>
            {% for person in persons %}
            <li>Name: {{ person.f_name }}</li>
            <li>Age: {{ person.age }}</li>
            <li>
                <a href="{% url 'update_u' person.id %}">EDIT</a> |
                <a href="{% url 'delete_u' person.id %}">DELETE</a>
            </li>
            </br>
            {% endfor %}
        </ul>
{% endblock %}
