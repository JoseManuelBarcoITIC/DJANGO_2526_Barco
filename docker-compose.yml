version: '3.1'
services:
 db:
   image: postgres:14
   container_name: db_DJ
   environment:
     - POSTGRES_DB=djangobackend
     - POSTGRES_PASSWORD=admin
     - POSTGRES_USER=admin
   ports:
     - "5432:5432"
   volumes:
     - local_pgdata:/var/lib/postgresql/data
 pgadmin:
   image: dpage/pgadmin4
   container_name: pg_DJ
   ports:
     - "80:80"
   environment:
     PGADMIN_DEFAULT_EMAIL: admin@backend.com
     PGADMIN_DEFAULT_PASSWORD: admin
   volumes:
     - pgadmin-data:/var/lib/pgadmin
volumes:
 local_pgdata:
 pgadmin-data: